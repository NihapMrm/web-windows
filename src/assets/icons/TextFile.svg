
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <!-- Drop shadow filter -->
  <defs>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <filter id="fold-shadow" x="0%" y="0%" width="100%" height="100%">
      <feDropShadow dx="-1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Main document body (with folded corner cutout) -->
  <path d="M 20 10 L 148 10 L 180 42 L 180 250 L 20 250 Z"
        fill="white"
        stroke="#c0c4cc"
        stroke-width="1.5"/>

  <!-- Folded corner triangle (the fold-back piece) -->
  <path d="M 148 10 L 180 42 L 148 42 Z"
        fill="transparent"
        stroke="#b8bcc8"
        stroke-width="1"/>

  <!-- Fold crease line -->
  <line x1="148" y1="10" x2="148" y2="42" stroke="#c0c4cc" stroke-width="1"/>
  <line x1="148" y1="42" x2="180" y2="42" stroke="#c0c4cc" stroke-width="1"/>

  <!-- Horizontal lines -->
  <g stroke="#c8cdd8" stroke-width="1" stroke-linecap="round">
    <line x1="36" y1="60"  x2="164" y2="60"/>
    <line x1="36" y1="75"  x2="164" y2="75"/>
    <line x1="36" y1="90"  x2="164" y2="90"/>
    <line x1="36" y1="105" x2="164" y2="105"/>
    <line x1="36" y1="120" x2="164" y2="120"/>
    <line x1="36" y1="135" x2="164" y2="135"/>
    <line x1="36" y1="150" x2="164" y2="150"/>
    <line x1="36" y1="165" x2="164" y2="165"/>
    <line x1="36" y1="180" x2="164" y2="180"/>
    <line x1="36" y1="195" x2="164" y2="195"/>
    <line x1="36" y1="210" x2="164" y2="210"/>
    <line x1="36" y1="225" x2="164" y2="225"/>
    <line x1="36" y1="240" x2="164" y2="240"/>
  </g>
</svg>
